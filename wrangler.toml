# Wrangler config for Cloudflare Workers (replace placeholders before deploying)
name = "falcon-portfolio"
compatibility_date = "2026-06-17"
account_id = "YOUR_ACCOUNT_ID"
workers_dev = false
# To deploy to a custom domain uncomment and set the route or routes
# route = "example.com/*"
# routes = ["example.com/*"]

# Use modules type for ESM output (removed — handled by OpenNext)
# Optional: specify a directory for static assets if using Pages or R2
# site = { bucket = "public", include = ["**/*"] }

# Build command is run locally; OpenNext will output Worker files into .open-next by default

# NOTE: Fill `account_id` and optionally `route` before running `wrangler deploy`.
